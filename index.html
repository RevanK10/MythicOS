<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MythicOS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar" id="top">
        <div class="os-branding" id="welcomeOpen">MythicOS</div>
        <div class="system-status">Realm Online</div>
        <div class="clock" id="timeElement">Loading Time...</div>
    </div>

    <div id="desktopApps">
        <div class="desktop-icon" id="vaultIcon">
            <img src="https://images.unsplash.com/photo-1614064641938-3bbee52942c7?q=80&w=150" alt="Vault Icon">
            <p>Mythic Vault</p>
        </div>
    </div>

    <div class="window" id="welcome">
        <div class="windowheader" id="welcomeheader">
            <div class="closebutton" id="welcomeclose"></div>
            <p class="headertext">Welcome.app</p>
            <div style="width: 12px;"></div> </div>
        
        <div class="window-content">
            <img class="avatar" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200" alt="MythicOS Logo">
            <h1>Welcome to MythicOS</h1>
            <h3>Version 1.0.0</h3>
            <p>
                Your custom environment is ready. This architecture blends HTML5 structural frames, fluid CSS aesthetics, and reactive local clock engines. 
            </p>
        </div>
    </div>

    <div class="window" id="vault" style="width: 550px; height: 400px;">
        <div class="windowheader" id="vaultheader">
            <div class="closebutton" id="vaultclose"></div>
            <p class="headertext">Mythic Vault</p>
            <div style="width: 12px;"></div>
        </div>
        
        <div class="app-container">
            <div id="sidebar">
                </div>
            <div id="contentDisplay">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
