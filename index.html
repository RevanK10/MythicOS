<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MythicOS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="top-bar" id="top">
        <div class="os-branding" id="welcomeOpen">MythicOS</div>
        <div class="system-status">Realm Online</div>
        <div class="clock" id="timeElement">Loading Time...</div>
    </div>

    <div id="desktopApps">
        <div class="desktop-icon" id="notesIcon">
            <img src="https://images.unsplash.com/photo-1517842645767-c639042777db?q=80&w=150" alt="Notes Icon">
            <p>Notes</p>
        </div>
    </div>

    <div class="window" id="welcome">
        <div class="windowheader" id="welcomeheader">
            <div class="closebutton" id="welcomeclose"></div>
            <p class="headertext">Welcome</p>
            <div style="width: 12px;"></div> 
        </div>
        
        <div class="window-content">
            <img class="avatar" src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200" alt="MythicOS Logo">
            <h1>Welcome to MythicOS</h1>
            <h3>Version 1.0.0</h3>
            <p>
                Your custom environment is ready. This architecture blends HTML5 structural frames, fluid CSS aesthetics, and reactive local clock engines. 
            </p>
        </div>
    </div>

    <div class="window" id="notes" style="width: 500px; height: 380px;">
        <div class="windowheader" id="notesheader">
            <div style="display: flex; gap: 8px; align-items: center;">
                <div class="closebutton" id="notesclose"></div>
                <div class="maximizebutton" id="notesmaximize"></div>
            </div>
            
            <p class="headertext">Notes</p>
            <div style="width: 32px;"></div>
        </div>
        
        <div class="app-container" style="display: flex; flex-direction: column; flex: 1;">
            <textarea id="notepad" placeholder="Write down your mythic logs, strategies, or scratchpad notes here..."></textarea>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
